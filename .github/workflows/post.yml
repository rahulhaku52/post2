name: Sex Ed Auto Poster

on:
  schedule:
    - cron: '*/30 * * * *'   # প্রতি ৩০ মিনিট (ইচ্ছেমতো বদলাবে)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # গিট পুশের জন্য জরুরি

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install requests

      - name: Run poster
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py

      # posted_index.json আপডেট হলে গিটে কমিট করে দেবে
      - name: Commit updated index
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add posted_index.json
          git diff --cached --quiet || (git commit -m "Update posted index" && git push)
